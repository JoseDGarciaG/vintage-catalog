<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ item.name }} — The Vintage Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --brown: #4a3728;
      --tan: #c9a87c;
      --dark: #2b1f15;
      --muted: #8a7060;
    }

    body {
      background-color: var(--cream);
      color: var(--dark);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
    }

    header {
      text-align: center;
      padding: 2rem 1rem;
      border-bottom: 1px solid var(--tan);
    }

    header a {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--brown);
      text-decoration: none;
      letter-spacing: 2px;
    }

    main {
      max-width: 900px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }

    @media (max-width: 600px) {
      main { grid-template-columns: 1fr; }
    }

    .item-image img {
      width: 100%;
      border-radius: 4px;
      object-fit: cover;
      max-height: 480px;
      background-color: #e8dfd0;
      display: block;
    }

    .item-info {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .item-info .era {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .item-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--brown);
      line-height: 1.3;
    }

    .item-info .price {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--brown);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--tan);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      padding: 0.4rem 0;
      color: var(--muted);
    }

    .detail-row span:last-child {
      color: var(--dark);
      font-weight: 400;
    }

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      text-decoration: none;
      color: var(--brown);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--tan);
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }

    .back-link:hover { opacity: 0.6; }

    footer {
      text-align: center;
      padding: 2rem;
      margin-top: 4rem;
      border-top: 1px solid var(--tan);
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <header>
    <a href="/">The Vintage Room</a>
  </header>

  <main>
    <div class="item-image">
      <img src="/static/images/{{ item.image }}" alt="{{ item.name }}" />
    </div>

    <div class="item-info">
      <div class="era">{{ item.era }}</div>
      <h1>{{ item.name }}</h1>
      <div class="price">{{ item.price }}</div>

      <hr class="divider"/>

      <div class="detail-row">
        <span>Size</span>
        <span>{{ item.size }}</span>
      </div>
      <div class="detail-row">
        <span>Era</span>
        <span>{{ item.era }}</span>
      </div>
      <div class="detail-row">
        <span>Condition</span>
        <span>Good vintage condition</span>
      </div>

      <hr class="divider"/>

      <a class="back-link" href="/">← Back to catalog</a>
    </div>
  </main>

  <footer>
    &copy; 2025 The Vintage Room — All pieces are one of a kind
  </footer>

</body>
</html>
