<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vintage Catalog</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --brown: #4a3728;
      --tan: #c9a87c;
      --dark: #2b1f15;
      --muted: #8a7060;
    }

    body {
      background-color: var(--cream);
      color: var(--dark);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid var(--tan);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--brown);
      letter-spacing: 2px;
    }

    header p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    main {
      max-width: 1100px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0d5c5;
      border-radius: 4px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(74,55,40,0.12);
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      background-color: #e8dfd0;
    }

    .card-body {
      padding: 1.2rem;
    }

    .card-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--brown);
      margin-bottom: 0.4rem;
    }

    .card-body .era {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .card-body .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }

    .card-body .size {
      background: var(--cream);
      border: 1px solid var(--tan);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--brown);
    }

    .card-body .price {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--brown);
    }

    footer {
      text-align: center;
      padding: 2rem;
      margin-top: 4rem;
      border-top: 1px solid var(--tan);
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <header>
    <h1>The Vintage Room</h1>
    <p>Curated pieces from another era</p>
  </header>

  <main>
    <div class="grid">
      {% for item in items %}
      <a class="card" href="/item/{{ item.id }}">
        <img src="/static/images/{{ item.image }}" alt="{{ item.name }}" />
        <div class="card-body">
          <div class="era">{{ item.era }}</div>
          <h2>{{ item.name }}</h2>
          <div class="meta">
            <span class="size">{{ item.size }}</span>
            <span class="price">{{ item.price }}</span>
          </div>
        </div>
      </a>
      {% endfor %}
    </div>
  </main>

  <footer>
    &copy; 2025 The Vintage Room — All pieces are one of a kind
  </footer>

</body>
</html>
